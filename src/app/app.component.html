<div class="app-layout">
  <!-- Sticky Header -->
  <header class="app-header">
    <div class="app-brand">
      <button class="sidebar-toggle" *ngIf="isLoggedIn()" (click)="toggleSidebar()" aria-label="Toggle Navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="app-title">{{ siteTitle }}</span>
    </div>
    <div class="header-actions">
      <button mat-button (click)="navigate('/les1')" *ngIf="isLoggedIn()">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </button>
      
      <ng-container *ngIf="isLoggedIn(); else loginBtn">
        <span class="user-greeting">Welcome, <strong>{{ getUserName() }}</strong></span>
        <button mat-button (click)="logout()" class="logout-btn">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </ng-container>
      
      <ng-template #loginBtn>
        <button mat-button (click)="navigate('/register')">
          <mat-icon>login</mat-icon>
          <span>Login / Register</span>
        </button>
      </ng-template>
    </div>
  </header>

  <div class="app-body">
    <!-- Sidebar Backdrop for mobile -->
    <div class="sidebar-backdrop" *ngIf="isLoggedIn() && isSidebarActive" (click)="toggleSidebar()"></div>

    <aside class="app-sidebar" *ngIf="isLoggedIn()" [class.sidebar-open]="isSidebarActive" [class.sidebar-collapsed]="!isSidebarActive">
      <nav class="sidebar-menu">
        <div class="menu-item" *ngFor="let item of menuItems">
          <div class="menu-link-wrapper" [class.active]="selectedLessonId === item.id">
            <a (click)="selectLesson(item.id, item.url)" class="menu-link">
              <mat-icon>bookmark</mat-icon>
              <span>{{ item.name }}</span>
            </a>
            
            <!-- Submenu for Quizzes and Fillblank if active -->
            <div class="lesson-submenus" *ngIf="selectedLessonId === item.id">
              <a (click)="navigate('/' + item.quiz)" class="submenu-link">
                <mat-icon>quiz</mat-icon>
                <span>Quiz</span>
              </a>
              <a (click)="navigate('/' + item.fillblank)" class="submenu-link">
                <mat-icon>edit_note</mat-icon>
                <span>Fill Blank</span>
              </a>
            </div>
          </div>
        </div>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="app-content">
      <div class="content-container">
        <router-outlet></router-outlet>
        
        <!-- Lesson Navigation Footer -->
        <div class="lesson-navigation" *ngIf="getCurrentStep() !== null">
          <button class="btn btn-secondary" (click)="goToPreviousStep()" [disabled]="!hasPreviousStep()">
            <mat-icon>navigate_before</mat-icon>
            <span>{{ getPreviousButtonText() }}</span>
          </button>
          
          <span class="lesson-indicator">{{ getStepIndicatorText() }}</span>
          
          <button class="btn btn-primary" (click)="goToNextStep()" [disabled]="!hasNextStep()">
            <span>{{ getNextButtonText() }}</span>
            <mat-icon>navigate_next</mat-icon>
          </button>
        </div>
      </div>
    </main>
  </div>
</div>
